<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movies</title>
</head>

<body>
    <h1>Search Page</h1>
    <form method="POST" action="/search">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Search text</label><br>
        <input type="text" name="title" value="search_text">
        <button type="submit">Add</button><br>
    </form>
    <h2> Search Results</h2>
    {% if title %}
        <p>You searched for: {{ title }}</p>
    {% else %}
        <p>No search yet.</p>
    {% endif %}
https://www.google.com/?q=tools

<form action="/add-hpage" method="POST">
   
    <label>Page Title</label><br>
    <input type="text" name="title" placeholder="e.g. Seven Years War" required><br><br>

    <label>Era</label><br>
    <select id="era" name="era" onchange="updatePeriods()">
      <option value="">— Select Era —</option>
      {% for era in periods %}
        <option value="{{ era }}">{{ era }}</option>
      {% endfor %}
    </select><br><br>

</body>
</html>
