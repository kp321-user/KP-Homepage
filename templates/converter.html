<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='darkstyle.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="icon" href="{{ url_for('static', filename='favicon-32x32.png') }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ url_for('static', filename='favicon-16x16.png') }}" sizes="16x16" type="image/png">
  <link rel="icon" href="{{ url_for('static', filename='favicon-256x256.png') }}" sizes="256x256" type="image/png">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">

  <style>
    .converter-box {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      box-sizing: border-box;
    }
    .folder-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 1px 0;
    }
    #folder-display {
      flex: 1;
      padding: 10px;
      opacity: 0.7;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <img src="{{ url_for('static', filename='favicon-256x256.png') }}" class="top-right-logo" alt="Logo">
    <div class="converter-box">
      <h1>YouTube Video Converter</h1>
      <a href="/" class="back-link">← Back Home</a>
      <hr>

      <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />

      <label>Format</label><br>
      <select id="format">
          <option value="mp3">MP3 (audio only)</option>
          <option value="mp4">MP4 (video)</option>
      </select>
      <br><br>

      <button onclick="convertVideo()">Download</button>

      <!-- short status line, e.g. "Downloading..." / "Converting audio..." -->
      <div id="status"></div>

      <!-- progress bar widget: hidden until a conversion starts -->
      <div class="progress-container" id="progress-container">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div id="progress-text"></div>
      </div>

      <h3>Download History</h3>
      <ul id="history-list"></ul>
    </div>

  <script>
    async function pickFolder() {
      document.getElementById("status").textContent = "Opening folder picker...";
      const res = await fetch("/pick-folder");
      const data = await res.json();
      document.getElementById("folder-display").value = data.folder;
      document.getElementById("status").textContent = "Folder selected.";
    }

    async function convertVideo() {
      const url = document.getElementById("url").value.trim();
      if (!url) {
        document.getElementById("status").textContent = "Please enter a URL.";
        return;
      }

      const statusEl = document.getElementById("status");
      const container = document.getElementById("progress-container");
      const fill = document.getElementById("progress-fill");
      const text = document.getElementById("progress-text");

      statusEl.textContent = "Starting...";
      container.style.display = "block";
      fill.className = "progress-bar-fill";
      fill.style.width = "0%";
      text.textContent = "";

      const csrfResp = await fetch("/csrf-token");
      const csrfData = await csrfResp.json();

      const formData = new FormData();
      const format = document.getElementById("format").value;
      formData.append("format", format);
      formData.append("url", url);
      formData.append("csrf_token", csrfData.csrf_token);

      const startRes = await fetch("/convert", {
        method: "POST",
        body: formData
      });

      if (!startRes.ok) {
        statusEl.textContent = "Failed to start conversion.";
        container.style.display = "none";
        return;
      }

      const { job_id } = await startRes.json();
      pollProgress(job_id);
    }

    async function pollProgress(jobId) {
      const fill = document.getElementById("progress-fill");
      const text = document.getElementById("progress-text");
      const statusEl = document.getElementById("status");
      const container = document.getElementById("progress-container");

      const res = await fetch(`/progress/${jobId}`);
      const data = await res.json();

      if (data.status === "downloading") {
        statusEl.textContent = "Downloading...";
        fill.className = "progress-bar-fill";
        if (data.percent != null) {
          fill.style.width = data.percent + "%";
          const speed = data.speed ? (data.speed / 1024).toFixed(0) + " KB/s" : "";
          const eta = data.eta != null ? `ETA ${data.eta}s` : "";
          text.textContent = `${data.percent}% ${speed} ${eta}`.trim();
        } else {
          fill.className = "progress-bar-fill indeterminate";
          text.textContent = "Downloading...";
        }
        setTimeout(() => pollProgress(jobId), 1000);

      } else if (data.status === "processing" || data.status === "finalizing") {
        statusEl.textContent = "Converting audio...";
        fill.className = "progress-bar-fill indeterminate";
        text.textContent = "Processing with ffmpeg, this can take a moment...";
        setTimeout(() => pollProgress(jobId), 1000);

      } else if (data.status === "starting") {
        statusEl.textContent = "Starting...";
        setTimeout(() => pollProgress(jobId), 1000);

      } else if (data.status === "done") {
        fill.className = "progress-bar-fill";
        fill.style.width = "100%";
        text.textContent = "Done.";
        statusEl.textContent = "Finishing up download...";
        await downloadFinishedFile(jobId);

      } else if (data.status === "error") {
        let msg = "Something went wrong.";
        if (data.error) {
          if (data.error.includes("Sign in to confirm")) {
            msg = "This video is protected by YouTube and can't be downloaded from a server.";
          } else if (data.error.includes("not available")) {
            msg = "This video format is not available for download.";
          } else {
            msg = "Error: " + data.error;
          }
        }
        statusEl.textContent = msg;
        container.style.display = "none";

      } else {
        statusEl.textContent = "Lost track of this job.";
        container.style.display = "none";
      }
    }

    async function downloadFinishedFile(jobId) {
      const statusEl = document.getElementById("status");
      const container = document.getElementById("progress-container");

      const res = await fetch(`/download/${jobId}`);
      if (!res.ok) {
        statusEl.textContent = "File wasn't ready or already cleaned up.";
        container.style.display = "none";
        return;
      }

      const blob = await res.blob();

      // Extract filename from response header
      const disposition = res.headers.get("Content-Disposition");
      let filename = "download";
      if (disposition) {
        const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)["']?/i);
        if (match) filename = decodeURIComponent(match[1]);
      }

      const downloadUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = downloadUrl;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(downloadUrl);

      statusEl.textContent = "Done! Check your downloads.";
      container.style.display = "none";
      loadHistory();
    }

    async function loadHistory() {
      const res = await fetch("/download-history");
      const data = await res.json();
      const list = document.getElementById("history-list");
      list.innerHTML = "";
      for (const title of data.history) {
          const li = document.createElement("li");
          li.textContent = title;
          list.appendChild(li);
      }
    }

    // load history when page opens
    loadHistory();
  </script>
</body>
</html>
