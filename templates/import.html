<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='darkstyle.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="icon" href="{{ url_for('static', filename='favicon-32x32.png') }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ url_for('static', filename='favicon-16x16.png') }}" sizes="16x16" type="image/png">
  <link rel="icon" href="{{ url_for('static', filename='favicon-256x256.png') }}" sizes="256x256" type="image/png">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
  <h1>Import New Page</h1>
  <a href="/" class="back-link">← Back Home</a>

  <form action="/import" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Page Title</label><br>
    <input type="text" name="title" placeholder="e.g. Seven Years War" required><br><br>

    <label>Era</label><br>
    <select id="era" name="era" onchange="updatePeriods()">
      <option value="">— Select Era —</option>
      {% for era in periods %}
        <option value="{{ era }}">{{ era }}</option>
      {% endfor %}
    </select><br><br>

    <label>Period</label><br>
    <select id="period" name="period" onchange="updatePhases()" disabled>
      <option value="">— Select Era first —</option>
    </select><br><br>

    <label>Phase</label><br>
    <select id="phase" name="phase" disabled>
      <option value="">— Select Period first —</option>
    </select><br><br>

    <label>Start Year (use negative for BCE, e.g. -500 for 500 BCE)</label><br>
    <input type="number" name="start_year" placeholder="e.g. 1789"><br><br>

    <label>Content (Markdown)</label><br>
    <textarea name="content" rows="20" style="width: 100%; font-family: monospace; background-color: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 10px; font-size: 14px;" placeholder="Paste markdown here..."></textarea><br><br>

    <button type="submit">Create Page</button>
    <a href="/history"><button type="button">Cancel</button></a>
  </form>
<script>
  const periodsData = {{ periods | tojson }};

  function updatePeriods() {
    const era = document.getElementById("era").value;
    const periodSel = document.getElementById("period");
    const phaseSel = document.getElementById("phase");

    periodSel.innerHTML = '<option value="">— Select Period —</option>';
    phaseSel.innerHTML = '<option value="">— Select Period first —</option>';
    phaseSel.disabled = true;

    if (!era) { periodSel.disabled = true; return; }
    periodSel.disabled = false;

    for (const period in periodsData[era]) {
      const opt = document.createElement("option");
      opt.value = period;
      opt.textContent = period;
      periodSel.appendChild(opt);
    }
  }

  function updatePhases() {
    const era = document.getElementById("era").value;
    const period = document.getElementById("period").value;
    const phaseSel = document.getElementById("phase");

    phaseSel.innerHTML = '<option value="">— Select Phase —</option>';

    if (!period) { phaseSel.disabled = true; return; }
    phaseSel.disabled = false;

    periodsData[era][period].forEach(phase => {
      const opt = document.createElement("option");
      opt.value = phase;
      opt.textContent = phase;
      phaseSel.appendChild(opt);
    });
  }
</script>
</body>
</html>
